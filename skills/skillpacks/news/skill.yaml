name: news
enabled: true
category: query
entrypoint: scripts/main.py
description: 新闻聚合与热搜资讯工具集
parameters:
  type: object
  properties:
    topic:
      type: string
      description: daily/ai_news/tech_news/trending/joke/history/epic/gold/baike/exchange
    platform:
      type: string
      description: trending 模式的平台，支持 微博/知乎/抖音/B站/百度/头条/小红书
    source:
      type: string
      description: tech_news 模式的来源，支持 IT之家/Hacker News
    keyword:
      type: string
      description: baike 模式关键词
  required: []
